name: Game Data Collector

on:
  schedule:
    # 1. 시청자/트렌드 전수조사 (매일 KST 오후 7시 = UTC 10:00)
    - cron: '0 10 * * *'
    
    # 2. 신작/플탐/메타데이터 무거운 수집 (매일 KST 새벽 3시 = UTC 18:00)
    - cron: '0 18 * * *'
    
  workflow_dispatch:
    inputs:
      job_type:
        description: '강제 실행할 작업을 선택하세요'
        required: true
        default: 'all'
        type: choice
        options:
          - trend (시청자 수만 갱신)
          - game (신작/메타데이터만 수집)
          - all (전체 실행)

jobs:
  collect:
    runs-on: ubuntu-latest

    env:
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      ITAD_API_KEY: ${{ secrets.ITAD_API_KEY }}
      TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
      TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
      CHZZK_CLIENT_ID: ${{ secrets.CHZZK_CLIENT_ID }}
      CHZZK_CLIENT_SECRET: ${{ secrets.CHZZK_CLIENT_SECRET }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install Dependencies
      run: |
        cd backend
        npm install

    # ==========================================
    # Task A: 시청자 전수조사 (UTC 10:00 또는 수동 실행 시)
    # ==========================================
    - name: Run Trend Collector
      if: github.event.schedule == '0 10 * * *' || github.event.inputs.job_type == 'trend' || github.event.inputs.job_type == 'all'
      run: |
        echo "🚀 시청자 트렌드 전수조사 가동"
        cd backend
        node scripts/trend_collector.js

    # ==========================================
    # Task B: 신작 및 메타데이터 수집 (UTC 18:00 또는 수동 실행 시)
    # ==========================================
    - name: Run Game Metadata Collector
      if: github.event.schedule == '0 18 * * *' || github.event.inputs.job_type == 'game' || github.event.inputs.job_type == 'all'
      run: |
        echo "🚀 게임 메타데이터 수집 가동"
        cd backend
        node scripts/metadata_seeder.js
        node scripts/category_seeder.js
        node scripts/game_collector.js