version: '3.8'

services:
  my-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: my-backend
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  my-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: my-frontend
    depends_on:
      - my-backend
    restart: always

  my-nginx:
    image: nginx:latest
    container_name: my-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf:/etc/nginx/conf.d
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    depends_on:
      - my-frontend
      - my-backend
    restart: always

  certbot:
    image: certbot/certbot
    container_name: certbot
    entrypoint: ""
    volumes:
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    command: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew; done;'"
    restart: always
