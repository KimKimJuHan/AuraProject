version: '3.8'

services:
  my-backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: my-backend
    # 외부 노출 포트(8000:8000) 삭제 완료. Nginx만 내부망으로 접근 가능.
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
    restart: always

  my-frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: my-frontend
    # 외부 노출 포트(3000:3000) 삭제 완료. 개구멍 완전 차단.
    environment:
      - CHOKIDAR_USEPOLLING=true
      - HOST=0.0.0.0
    depends_on:
      - my-backend
    restart: always

  my-nginx:
    image: nginx:latest
    container_name: my-nginx
    ports:
      - "80:80"   # 인터넷에 허용된 유일한 출입구
      - "443:443" # 인터넷에 허용된 유일한 출입구 (보안 연결)
    volumes:
      - ./nginx/conf:/etc/nginx/conf.d
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    depends_on:
      - my-frontend
      - my-backend
    restart: always

  certbot:
    image: certbot/certbot
    container_name: certbot
    entrypoint: ""
    volumes:
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    command: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew; done;'"
    restart: always
